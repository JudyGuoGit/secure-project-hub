spring:
  application:
    name: secure-project-hub
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
    baselineVersion: "0"

springdoc:
  swagger-ui:
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    persist-authorization: true
  api-docs:
    enabled: true
    resolve-schema-properties: true
  show-actuator: false

logging:
  level:
    root: INFO
    com.judy: DEBUG
    com.judy.secureprojecthub.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

